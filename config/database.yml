default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  adapter: sqlite3
  database: storage/development.sqlite3
  <<: *default

test:
  adapter: sqlite3
  database: storage/test.sqlite3
  <<: *default

production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>

  primary:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>

  cable:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>

  queue:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>

  cache:
    adapter: postgresql
    url: <%= ENV['DATABASE_URL'] %>
